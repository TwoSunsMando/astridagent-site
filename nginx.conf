server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static HTML should never be cached by browsers/CDNs — otherwise
    # users get stale copies after a deploy (iOS Safari is especially
    # aggressive about heuristic caching when no Cache-Control is set).
    # Deploys are small and fast; no caching savings needed for a
    # single-page marketing site.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }
}